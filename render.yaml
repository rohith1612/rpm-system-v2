services:
  - type: web
    name: rpm-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CERNER_BASE_URL
        sync: false
      - key: SYSTEM_CLIENT_ID
        sync: false
      - key: SYSTEM_CLIENT_SECRET
        sync: false
      - key: SMART_AUTH_URL
        sync: false
      - key: SMART_TOKEN_URL
       