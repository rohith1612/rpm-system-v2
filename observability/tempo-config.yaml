# Grafana Tempo Configuration
# Local development tracing pipeline using filesystem storage.

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m  # Cut block every 5 minutes
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 1

compactor:
  compaction:
    compaction_window: 1h  # Compaction window for grouping blocks
    max_block_bytes: 5368709120  # Max block size of 5GB
    block_retention: 168h  # Trace retention period of approx 7 days (168 hours)

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946
  join_members:
    - tempo
