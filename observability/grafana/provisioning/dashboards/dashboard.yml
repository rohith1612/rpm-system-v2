# Grafana Dashboards Provisioning
apiVersion: 1

providers:
  - name: 'Default Dashboards'
    orgId: 1
    folder: 'Observability'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true # Allow editing dashboards directly in the Grafana UI
    updateIntervalSeconds: 10 # Scrape/refresh directory for updates every 10 seconds
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
