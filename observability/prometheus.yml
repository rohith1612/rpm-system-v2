# Prometheus Configuration
# Uses container names for internal communication in the Docker Compose network.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 1. Scrape Prometheus's own metrics using its container name
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # 2. Scrape OpenTelemetry Collector internal self-telemetry metrics
  - job_name: 'otel-collector-internal'
    static_configs:
      - targets: ['otel-collector:8888']

  # 3. Scrape OTel-exported application/system metrics
  - job_name: 'otel-collector-metrics'
    static_configs:
      - targets: ['otel-collector:8889']
