<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>Heartbeat Monitor</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:40px;
}

h1{
    margin-bottom:30px;
}

.container{
    display:flex;
    gap:20px;
}

.card {
    width:220px;
    padding:20px;
    border-radius:12px;
    transition:all 0.3s ease;
}

.normal{
    background:#d4edda;
}

.warning{
    background:#fff3cd;
}

.critical{
    background:#f8d7da;
}

.device{
    font-size:20px;
    font-weight:bold;
}

.heart{
    font-size:48px;
    margin-top:20px;
}

.rate{
    font-size:36px;
    color:#d63031;
    margin-top:10px;
}

.updated{
    margin-top:10px;
    color:gray;
    font-size:12px;
}

.online{
    color:green;
}

</style>

</head>

<body>

<h1>MQTT Heartbeat Dashboard</h1>
<div class="container">

    <div class="card normal" id="card_device001">
        <div class="device">Device 001</div>
        <div class="heart">❤️</div>
        <div id="device001" class="rate">--</div>
        <div id="status001" class="updated">Waiting...</div>
    </div>

    <div class="card normal" id="card_device002">
        <div class="device">Device 002</div>
        <div class="heart">❤️</div>
        <div id="device002" class="rate">--</div>
        <div id="status002" class="updated">Waiting...</div>
    </div>

    <div class="card normal" id="card_device003">
        <div class="device">Device 003</div>
        <div class="heart">❤️</div>
        <div id="device003" class="rate">--</div>
        <div id="status003" class="updated">Waiting...</div>
    </div>

</div>

<script>

const ws = new WebSocket(
    `ws://${location.host}/ws`
);

function updateCard(deviceId, heartbeat){

    const rate = document.getElementById(deviceId);

    const card = document.getElementById(
        "card_" + deviceId
    );

    rate.innerHTML = heartbeat + " BPM";

    card.classList.remove(
        "normal",
        "warning",
        "critical"
    );

    if(heartbeat >= 60 && heartbeat <= 100){

        card.classList.add("normal");

    }
    else if(
        (heartbeat >= 50 && heartbeat < 60) ||
        (heartbeat > 100 && heartbeat <= 120)
    ){
        card.classList.add("warning");
    }
    else{
        card.classList.add("critical");
    }

    const statusMap = {
        device001:"status001",
        device002:"status002",
        device003:"status003"
    };

    document.getElementById(
        statusMap[deviceId]
    ).innerHTML =
        "Updated: " +
        new Date().toLocaleTimeString();
}

ws.onmessage = (event)=>{

    const msg = JSON.parse(event.data);

    if(msg.type === "snapshot"){

        Object.entries(msg.data)
            .forEach(([device,value])=>{

            if(value !== null){
                updateCard(device,value);
            }
        });

        return;
    }

    if(msg.type === "heartbeat"){
        updateCard(
            msg.device_id,
            msg.heartbeat
        );
    }
};

ws.onopen = ()=>{
    console.log("WebSocket Connected");
};

ws.onclose = ()=>{
    console.log("WebSocket Closed");
};

</script>

</body>
</html>
